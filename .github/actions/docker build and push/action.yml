name: Docker Build and Push
description: Logs into DockerHub, builds a secured multistage image, and pushes it with a short SHA tag.

inputs:
  username:
    description: DockerHub username
    required: true
  password:
    description: DockerHub password
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    # 1. Generate the short SHA in its own step first so outputs are ready for later steps
    - name: Generate Short SHA
      id: get_sha
      shell: bash
      run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    # 2. Build directly with your targeted DockerHub repo format
    - name: Build Docker image
      shell: bash
      run: |
        docker build -f Dockerfile -t ${{ inputs.username }}/nodeapp4:${{ steps.get_sha.outputs.sha }} .

    # 3. Push the image cleanly without needing an intermediate local tag
    - name: Push Image
      shell: bash
      run: |
        docker push ${{ inputs.username }}/nodeapp4:${{ steps.get_sha.outputs.sha }}
