name: pipeline_name

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  Sonar_qube:
    runs-on: [self-hosted, ubuntu-runner]
    if: github.event_name == 'pull_request'
    steps:
      - name: clone-code
        uses: actions/checkout@v4

      - name: sonarqube scan 
        uses: sonarsource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=NodeJS_App
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          
  docker:
    runs-on: [self-hosted, ubuntu-runner]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: prod
    
    steps:
      - name: Clone code
        uses: actions/checkout@v4  # Fixed: Changed from v7 to v4

      # Uses the exact folder location from your screenshot, escaping spaces with %20
      - name: Build and Push Docker Image via Composite Action
        uses: Arunkumar81096/revampcourse/.github/actions/docker%20build%20and%20push@featurebranch3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Note: double check if you named your secret DOCKERHUB_TOKEN or DOCKERHUB_PASSWORD
