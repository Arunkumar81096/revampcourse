name: docker-push
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  node:
    runs-on: [self-hosted, ubuntu-runner]
    steps:
      - name: clone-code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          
      # Make sure this block uses exactly 2 or 4 space indentation increments
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build Docker Image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/ak81096:$SHORT_SHA .
          
      # Ensure this step is aligned perfectly with the other '-' characters
      - name: Push Image to Docker Hub
        run: |
          docker push ak81096/ak81096:$SHORT_SHA
