name: docker-push
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  node:
    runs-on: [self-hosted, ubuntu-runner]
    steps:
      - name: clone-code
        uses: actions/checkout@v4

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          
          # Force the image name to lowercase to keep Docker happy
          IMAGE_NAME=$(echo "${{ vars.DOCKERHUB_USERNAME }}/ak81096" | tr '[:upper:]' '[:lower:]')
          
          echo "Building image: $IMAGE_NAME:$SHORT_SHA"
          docker build -t $IMAGE_NAME:$SHORT_SHA -f Dockerfile .
          
          echo "Pushing image to Docker Hub..."
          docker push $IMAGE_NAME:$SHORT_SHA
