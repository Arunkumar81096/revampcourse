name: sonarqube-test
on:
    pull_request:
      branches: ["main"]
    workflow_dispatch:
jobs:
    node:
      runs-on : [self-hosted, Linux]
      steps:
        - name: clone-code
          uses: actions/checkout@v4
          
        - name: sonarqube scan 
          uses: sonarsource/sonarqube-scan-action@v3
          with:
           args: >
             -Dsonar.projectKey=Revamp_assignment
             -Dsonar.sources=.
             -Dsonar.host.url=${{vars.SONAR_HOST_URL}}
             -Dsonar.login-${{secrets.SONAR_TOKEN}}
