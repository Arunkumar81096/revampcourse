name: sonarqube-test
on:
    pull_request:
      branches: ["main"]
    workflow_dispatch:
jobs:
    node:
      runs-on : [self-hosted, Linux, X64]
      steps:
        - name: clone-code
          uses: actions/checkout@v4
          
        - name: sonarqube scan 
          uses: sonarsource/sonarqube-scan-action@v3
          with:
           args: >
               sonar-scanner /
                 sonar.projectKey=Revamp_assignment
                 sonar.sources=.
                 sonar.host.url=${{vars.SONAR_HOST_URL}}
                 sonar.login-${{secrets.SONAR_TOKEN}}
