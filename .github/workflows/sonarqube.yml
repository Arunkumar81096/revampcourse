name: CI pipeline

on: 
  workflow_dispatch:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  sonar:
    runs-on: [self-hosted, own-runner]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarQube analysis
        # Upgraded from v4 to v6 to address security vulnerability and Node deprecation
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=NodeJS_App
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
