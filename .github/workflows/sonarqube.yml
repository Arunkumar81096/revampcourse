name: sonarqube-test
on:
    pull_request:
      branches: ["main"]
    workflow_dispatch:
jobs:
    node:
      runs-on : [self-hosted, Linux]
      steps:
        - name: clone-code
          uses: actions/checkout@v4
          
        - name: sonarqube scan 
          uses: sonarsource/sonarqube-scan-action@v3
          with:
           args: >
             -sonar.projectKey=Revamp_assignment
             -sonar.sources=.
             -sonar.host.url=http://localhost:9000
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
